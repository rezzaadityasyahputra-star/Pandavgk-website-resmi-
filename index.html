<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANDAVGK - Maintenance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #0a0a0c;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #ffffff;
        }

        /* Latar belakang partikel halus */
        .bg-dots {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        /* Lingkaran cahaya abstrak */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 114, 255, 0.15), transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            z-index: -1;
            animation: float 8s ease-in-out infinite alternate;
        }

        @keyframes float {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        /* Box Utama Modernt */
        .card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Badge Status */
        .status-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 2px;
            color: #00c6ff;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 198, 255, 0.2);
            text-transform: uppercase;
        }

        /* Teks Judul */
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Deskripsi */
        p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Box Waktu yang Menonjol */
        .time-box {
            background: linear-gradient(135deg, rgba(0, 198, 255, 0.1), rgba(0, 114, 255, 0.1));
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(0, 198, 255, 0.3);
        }

        .time-box span {
            font-weight: 800;
            color: #00c6ff;
            font-size: 1.2rem;
        }

        /* Efek Pulse pada titik indikator */
        .dot {
            height: 8px;
            width: 8px;
            background-color: #00c6ff;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #00c6ff;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 198, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 198, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 198, 255, 0); }
        }

    </style>
</head>
<body>

    <div class="bg-dots"></div>
    <div class="glow"></div>

    <div class="card">
        <div class="status-badge">System Update</div>
        
        <h1>MAAF WEBSITE PANDAVGK<br>SEDANG DIPERBARUI</h1>
        
        <p>Kami sedang mengoptimalkan pengalaman Anda. Mohon tunggu sebentar hingga proses selesai.</p>

        <div class="time-box">
            <span class="dot"></span>
            <span>HARAP KEMBALI JAM 20.30</span>
        </div>
    </div>

</body>
</html>
